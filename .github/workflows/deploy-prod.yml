# AIPPT Deploy prod — rebuild image, push to Harbor, and open a PR on
# AMD-SLAI/slai-app-platform syncing deploy/slai-app-prod/aippt/.
#
# Source-of-truth template:
#   .claude/skills/slai-app-creator/assets/templates/deploy-prod.yml.example
#
# Path-under-apex notes (AIPPT-specific):
#   - tls-secret.enc.yaml is the shared apex ciphertext (copied from platform
#     deploy/platform-tls/prod/tls-secret.enc.yaml). The TLS-generation step
#     early-exits when this file is present, so no CSR / TLS_PRIVATE_KEY_PEM
#     plumbing is required for AIPPT.
#   - z-ingress.yaml uses rewrite-target /$2 with path /aippt(/|$)(.*).
#
# Manual trigger (workflow_dispatch):
#   1) Checkout THIS app repo.
#   2) Build Dockerfile (linux/amd64) and push to Harbor (tag = ${{ github.sha }}).
#   3) Clone slai-app-platform, copy committed handoff manifests into deploy/slai-app-prod/aippt/,
#      stamp deployment image to FULL_IMAGE, open PR with the fallback PAT + gh flow.
#
# For human/agent submissions outside CI, prefer the hosted GitHub App helper:
#   skills/slai-app-creator/scripts/submit_to_app_platform.py deploy/slai-app-prod/<APP_ID>
#
# Handoff directory (committed in the app repo): deploy/slai-app-prod/<APP_ID>/ by default.
# Copy: deployment.yaml (required), service.yaml (required), z-ingress.yaml (required, FQDN — SKILL.md §3),
# secrets.enc.yaml (required), tls-secret.enc.yaml (required, TLS — SKILL.md §0f), networkpolicy.yaml if present.
# This resubmits manifest changes (not only image) when you edit handoff files.
#
# Only files that exist in handoff are copied — removing a file from handoff does not delete it on
# slai-app-platform; use a manual PR if you must drop a manifest there.
#
# Commit SOPS ciphertext: deploy/slai-app-prod/<APP_ID>/secrets.enc.yaml and tls-secret.enc.yaml —
# use .gitignore exceptions for those paths so Deploy prod can copy them (see SKILL.md §0d).
#
# Skill: SKILL.md §1c — CI PAT fallback, Harbor secrets, Variables, first onboard vs redeploy.
#
# Required GitHub Actions SECRETS (on THIS application repo — Settings → Secrets and variables → Actions):
#   HARBOR_USERNAME, HARBOR_PASSWORD  — approved CI Harbor robot/service identity
#   SLAI_APP_DEV_PR_TOKEN            — fine-grained PAT fallback for CI PR creation (see SKILL.md §1c); never log the value
#
# Optional SECRET (TLS automation in CI when csr/tls.key is not committed — gitignored locally):
#   TLS_PRIVATE_KEY_PEM              — PEM contents of tls.key (same as CSR private key). If unset,
#                                      commit csr/tls.key for CI to generate tls-secret.enc.yaml (not recommended).
#
# Required GitHub Actions VARIABLES (on THIS application repo — Settings → Secrets and variables → Actions → Variables):
#   APP_ID, IMAGE_NAME, BUILD_CONTEXT
#
# Optional VARIABLES:
#   HARBOR_REGISTRY (default mkmhub.amd.com); HARBOR_PROJECT is fixed to hw-slaiapp-dev in this template,
#   DOCKERFILE (default $BUILD_CONTEXT/Dockerfile), SLAI_APP_DEV_REPO (default AMD-SLAI/slai-app-platform),
#   MANIFEST_HANDOFF_REL — path from repo root to handoff dir, default deploy/slai-app-prod/<APP_ID> resolved at runtime
#
# Optional: set MANIFEST_HANDOFF_REL to e.g. deploy/slai-app-prod/my-app if your tree differs (still must contain YAMLs).
#
# Runner: must reach Harbor. Use ubuntu-latest if registry egress allows.

name: Deploy prod

on:
  workflow_dispatch:
    inputs:
      slai_base_ref:
        description: "Base branch on slai-app-platform for the PR (main = prod URL, dev = dev URL)"
        required: true
        default: main
        type: choice
        options:
          - main
          - dev

concurrency:
  group: deploy-prod-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  harbor-and-manifest-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL -o "$RUNNER_TEMP/yq" \
            "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64"
          install -m 0755 "$RUNNER_TEMP/yq" "${RUNNER_TEMP}/bin/yq"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"

      - name: Resolve configuration
        id: cfg
        env:
          V_APP_ID: ${{ vars.APP_ID }}
          V_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          V_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT }}
          V_HARBOR_REGISTRY: ${{ vars.HARBOR_REGISTRY }}
          V_DOCKERFILE: ${{ vars.DOCKERFILE }}
          V_SLAI_REPO: ${{ vars.SLAI_APP_DEV_REPO }}
          V_MANIFEST_HANDOFF_REL: ${{ vars.MANIFEST_HANDOFF_REL }}
        run: |
          set -euo pipefail
          APP_ID="${V_APP_ID}"
          IMAGE_NAME="${V_IMAGE_NAME}"
          BUILD_CONTEXT="${V_BUILD_CONTEXT}"
          if [[ -z "${APP_ID}" || -z "${IMAGE_NAME}" || -z "${BUILD_CONTEXT}" ]]; then
            echo "::error::Set repository Variables APP_ID, IMAGE_NAME, BUILD_CONTEXT (see workflow header)."
            exit 1
          fi
          HARBOR_REGISTRY="${V_HARBOR_REGISTRY:-mkmhub.amd.com}"
          HARBOR_PROJECT="hw-slaiapp-dev"
          DOCKERFILE="${V_DOCKERFILE:-${BUILD_CONTEXT}/Dockerfile}"
          SLAI_REPO="${V_SLAI_REPO:-AMD-SLAI/slai-app-platform}"
          HANDOFF_REL="${V_MANIFEST_HANDOFF_REL:-deploy/slai-app-prod/${APP_ID}}"
          if [[ ! -f "${DOCKERFILE}" ]]; then
            echo "::error::Dockerfile not found: ${DOCKERFILE}"
            exit 1
          fi
          echo "app_id=${APP_ID}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_context=${BUILD_CONTEXT}" >> "$GITHUB_OUTPUT"
          echo "harbor_registry=${HARBOR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "harbor_project=${HARBOR_PROJECT}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "slai_repo=${SLAI_REPO}" >> "$GITHUB_OUTPUT"
          echo "manifest_handoff_rel=${HANDOFF_REL}" >> "$GITHUB_OUTPUT"

      # Install kubectl + sops to /tmp; if tls-secret.enc.yaml is missing but leaf cert + key exist, build it (SOPS).
      - name: Ensure kubectl, sops, and tls-secret.enc.yaml
        env:
          APP_ID: ${{ steps.cfg.outputs.app_id }}
          SLAI_REPO: ${{ steps.cfg.outputs.slai_repo }}
          MANIFEST_HANDOFF_REL: ${{ steps.cfg.outputs.manifest_handoff_rel }}
          GH_TOKEN: ${{ secrets.SLAI_APP_DEV_PR_TOKEN }}
          TLS_PRIVATE_KEY_PEM: ${{ secrets.TLS_PRIVATE_KEY_PEM }}
        run: |
          set -euo pipefail
          HANDOFF="${GITHUB_WORKSPACE}/${MANIFEST_HANDOFF_REL}"
          CSR="${HANDOFF}/csr"
          if [[ -f "${HANDOFF}/tls-secret.enc.yaml" ]]; then
            echo "tls-secret.enc.yaml already present — skipping generation."
            exit 0
          fi
          SOPS_VERSION="${SOPS_VERSION:-3.9.4}"
          mkdir -p "${RUNNER_TEMP}/bin"
          # kubectl (client only — for `create secret tls --dry-run`)
          KUBE_VERSION="${KUBE_VERSION:-v1.29.6}"
          curl -fsSL -o "${RUNNER_TEMP}/kubectl" \
            "https://dl.k8s.io/release/${KUBE_VERSION}/bin/linux/amd64/kubectl"
          chmod +x "${RUNNER_TEMP}/kubectl"
          echo "${RUNNER_TEMP}" >> "$GITHUB_PATH"
          # sops (pinned; same family as skills/slai-app-creator/scripts/ensure-sops.sh)
          SOPS_CACHE="${SOPS_CACHE_DIR:-/tmp/slai-app-platform-sops-gha}"
          mkdir -p "$SOPS_CACHE"
          chmod 700 "$SOPS_CACHE" 2>/dev/null || true
          SOPS_BIN="${SOPS_CACHE}/sops-${SOPS_VERSION}"
          if [[ ! -x "$SOPS_BIN" ]]; then
            echo "Downloading sops v${SOPS_VERSION}..."
            _sops_bin_name="sops-v${SOPS_VERSION}.linux.amd64"
            _sops_url="https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/${_sops_bin_name}"
            _sums_url="https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.checksums.txt"
            curl -fsSL -o "${SOPS_BIN}.part" -- "${_sops_url}"
            curl -fsSL -o "${SOPS_CACHE}/sums.txt" -- "${_sums_url}"
            _want="$(awk -v "fn=${_sops_bin_name}" '$2 == fn { print $1; exit }' "${SOPS_CACHE}/sums.txt")"
            _got="$(sha256sum "${SOPS_BIN}.part" | awk '{ print $1 }')"
            if [[ "$_got" != "$_want" ]]; then
              echo "::error::sops checksum mismatch"
              exit 1
            fi
            mv -f "${SOPS_BIN}.part" "$SOPS_BIN"
            chmod +x "$SOPS_BIN"
          fi
          echo "${SOPS_CACHE}" >> "$GITHUB_PATH"
          ln -sf "$SOPS_BIN" "${SOPS_CACHE}/sops" || true
          export PATH="${SOPS_CACHE}:${PATH}"

          if [[ ! -f "${HANDOFF}/z-ingress.yaml" ]]; then
            echo "::error::Missing z-ingress.yaml — cannot derive TLS secret name. Add z-ingress.yaml or commit tls-secret.enc.yaml."
            exit 1
          fi
          SECRET_NAME="$(yq eval '.spec.tls[0].secretName' "${HANDOFF}/z-ingress.yaml" | tr -d '"')"
          NS="$(yq eval '.metadata.namespace' "${HANDOFF}/z-ingress.yaml" | tr -d '"')"
          if [[ -z "$SECRET_NAME" || "$SECRET_NAME" == "null" ]]; then
            echo "::error::z-ingress.yaml missing spec.tls[0].secretName"
            exit 1
          fi
          if [[ -z "$NS" || "$NS" == "null" ]]; then
            echo "::error::z-ingress.yaml missing metadata.namespace"
            exit 1
          fi

          KEY_FILE="${CSR}/tls.key"
          if [[ ! -f "$KEY_FILE" ]]; then
            if [[ -n "${TLS_PRIVATE_KEY_PEM:-}" ]]; then
              KEY_FILE="${RUNNER_TEMP}/tls-key.pem"
              printf '%s\n' "${TLS_PRIVATE_KEY_PEM}" > "$KEY_FILE"
              chmod 600 "$KEY_FILE"
            else
              echo "::error::Missing ${HANDOFF}/tls-secret.enc.yaml and no csr/tls.key in repo (gitignored?)." \
                "Commit tls-secret.enc.yaml locally, or add Actions secret TLS_PRIVATE_KEY_PEM (PEM), or (not recommended) commit tls.key."
              exit 1
            fi
          fi

          TLS_CRT="${RUNNER_TEMP}/tls.crt"
          : > "$TLS_CRT"
          found=0
          if [[ -d "$CSR" ]]; then
            for f in "$CSR"/*.crt; do
              [[ -f "$f" ]] || continue
              if head -1 "$f" | grep -q "BEGIN CERTIFICATE"; then
                cat "$f" >> "$TLS_CRT"
                found=1
                break
              fi
            done
            if [[ "$found" -eq 0 ]]; then
              for f in "$CSR"/*.cer; do
                [[ -f "$f" ]] || continue
                if openssl x509 -inform DER -in "$f" -out "${RUNNER_TEMP}/leaf.pem" 2>/dev/null; then
                  cat "${RUNNER_TEMP}/leaf.pem" >> "$TLS_CRT"
                  found=1
                  break
                fi
              done
            fi
          fi
          if [[ "$found" -eq 0 ]]; then
            echo "::error::Cannot build tls-secret: add a PEM *.crt or DER *.cer under ${CSR}/ (see SKILL.md §0f)."
            exit 1
          fi

          cert_mod="$(openssl x509 -noout -modulus -in "$TLS_CRT" 2>/dev/null | openssl md5)"
          key_mod="$(openssl rsa -noout -modulus -in "$KEY_FILE" 2>/dev/null | openssl md5)"
          if [[ "$cert_mod" != "$key_mod" ]]; then
            echo "::error::Certificate and private key modulus do not match (wrong tls.key or cert chain)."
            exit 1
          fi

          RAW="${RUNNER_TEMP}/tls-secret.raw.yaml"
          kubectl create secret tls "$SECRET_NAME" \
            --cert="$TLS_CRT" \
            --key="$KEY_FILE" \
            -n "$NS" \
            --dry-run=client -o yaml > "$RAW"
          yq eval ".metadata.labels.\"app.kubernetes.io/name\" = \"${APP_ID}\"" -i "$RAW"
          yq eval '.metadata.labels."hosted-by" = "slai-app-platform"' -i "$RAW"

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::SLAI_APP_DEV_PR_TOKEN required to clone slai-app-platform for .sops.yaml (SOPS encrypt)."
            exit 1
          fi
          SOPS_WORK="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${SLAI_REPO}.git" "$SOPS_WORK"
          (
            cd "$SOPS_WORK"
            sops encrypt \
              --filename-override "deploy/slai-app-prod/${APP_ID}/tls-secret.enc.yaml" \
              --input-type yaml \
              "$RAW" > "${HANDOFF}/tls-secret.enc.yaml"
          )
          echo "Wrote ${HANDOFF}/tls-secret.enc.yaml (SOPS)."

      - name: Set image coordinates
        id: image
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA}"
          FULL_IMAGE="${{ steps.cfg.outputs.harbor_registry }}/${{ steps.cfg.outputs.harbor_project }}/${{ steps.cfg.outputs.image_name }}:${TAG}"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.cfg.outputs.harbor_registry }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # Build linux/amd64 and load into the local docker daemon (no push yet) so the
      # smoke step below can run the image and verify probe paths before we pollute
      # Harbor and open a manifest PR.
      - name: Build container (linux/amd64, local load)
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.cfg.outputs.build_context }}
          file: ${{ steps.cfg.outputs.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.image.outputs.full_image }}

      # Probe smoke test: verify the built image actually responds 200 to every
      # readiness/liveness path declared in deployment.yaml, BEFORE the Harbor push
      # and manifest PR. A 404 here means kubelet will see the same 404 in the
      # cluster and CrashLoopBackOff the pod (see skills/slai-app-creator/references/when-users-ask.md).
      # Mirrors skills/slai-app-creator/scripts/probe-smoke.sh in slai-app-platform.
      - name: Smoke-test probe paths
        env:
          IMAGE: ${{ steps.image.outputs.full_image }}
          MANIFEST_HANDOFF_REL: ${{ steps.cfg.outputs.manifest_handoff_rel }}
        run: |
          set -euo pipefail
          DEP="${GITHUB_WORKSPACE}/${MANIFEST_HANDOFF_REL}/deployment.yaml"
          [[ -f "$DEP" ]] || { echo "::error::missing $DEP"; exit 1; }
          CPORT="$(yq eval '.spec.template.spec.containers[0].ports[0].containerPort' "$DEP" | tr -d '"')"
          [[ "$CPORT" =~ ^[0-9]+$ ]] || { echo "::error::could not read containerPort from $DEP"; exit 1; }
          BASE_PATH="$(yq eval '.spec.template.spec.containers[0].env[]? | select(.name=="BASE_PATH") | .value' "$DEP" | tr -d '"')"
          [[ "$BASE_PATH" == "null" ]] && BASE_PATH=""
          mapfile -t PATHS < <({ yq eval '.spec.template.spec.containers[0].livenessProbe.httpGet.path'  "$DEP"
                                yq eval '.spec.template.spec.containers[0].readinessProbe.httpGet.path' "$DEP"
                              } | tr -d '"' | grep -v '^null$' | awk '!seen[$0]++')
          if [[ ${#PATHS[@]} -eq 0 ]]; then
            echo "::warning::no readiness/livenessProbe httpGet.path declared — skipping smoke test"
            exit 0
          fi
          HOST_PORT=$((CPORT + 10000))
          CNAME="probe-smoke-${GITHUB_RUN_ID}"
          docker run -d --rm --name "$CNAME" -p "${HOST_PORT}:${CPORT}" \
            -e HOST=0.0.0.0 -e PORT="${CPORT}" \
            ${BASE_PATH:+-e BASE_PATH="${BASE_PATH}"} \
            "$IMAGE" >/dev/null
          trap 'docker rm -f "$CNAME" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            curl -fsS -o /dev/null --max-time 2 "http://127.0.0.1:${HOST_PORT}/" 2>/dev/null \
              || curl -sS -o /dev/null --max-time 2 "http://127.0.0.1:${HOST_PORT}/" 2>/dev/null && break
            sleep 1
          done
          fail=0
          for p in "${PATHS[@]}"; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://127.0.0.1:${HOST_PORT}${p}")
            if [[ "$code" == "200" ]]; then echo "GET $p -> $code OK"
            else echo "::error::GET $p -> $code (kubelet will see this in cluster -> CrashLoopBackOff)"; fail=1
            fi
          done
          [[ $fail -eq 0 ]] || { docker logs --tail 80 "$CNAME" || true; exit 1; }

      - name: Push container to Harbor
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.cfg.outputs.build_context }}
          file: ${{ steps.cfg.outputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.full_image }}

      - name: Clone slai-app-platform, sync manifests from handoff, stamp image, open PR
        env:
          GH_TOKEN: ${{ secrets.SLAI_APP_DEV_PR_TOKEN }}
          SLAI_BASE_REF: ${{ github.event.inputs.slai_base_ref }}
          APP_ID: ${{ steps.cfg.outputs.app_id }}
          SLAI_REPO: ${{ steps.cfg.outputs.slai_repo }}
          FULL_IMAGE: ${{ steps.image.outputs.full_image }}
          MANIFEST_HANDOFF_REL: ${{ steps.cfg.outputs.manifest_handoff_rel }}
        run: |
          set -euo pipefail
          HANDOFF="${GITHUB_WORKSPACE}/${MANIFEST_HANDOFF_REL}"
          if [[ ! -f "${HANDOFF}/deployment.yaml" ]]; then
            echo "::error::Missing handoff ${HANDOFF}/deployment.yaml — add manifests under ${MANIFEST_HANDOFF_REL} (see SKILL.md)."
            exit 1
          fi
          if [[ ! -f "${HANDOFF}/service.yaml" ]]; then
            echo "::error::Missing handoff ${HANDOFF}/service.yaml"
            exit 1
          fi
          if [[ ! -f "${HANDOFF}/z-ingress.yaml" ]]; then
            echo "::error::Missing handoff ${HANDOFF}/z-ingress.yaml — required (SKILL.md §3)."
            exit 1
          fi
          if [[ ! -f "${HANDOFF}/tls-secret.enc.yaml" ]]; then
            echo "::error::Missing handoff ${HANDOFF}/tls-secret.enc.yaml — required (SKILL.md §0f)."
            exit 1
          fi
          if [[ ! -f "${HANDOFF}/secrets.enc.yaml" ]]; then
            echo "::error::Missing ${HANDOFF}/secrets.enc.yaml — required."
            exit 1
          fi
          export FULL_IMAGE
          yq eval '.spec.template.spec.containers[0].image = strenv(FULL_IMAGE)' -i "${HANDOFF}/deployment.yaml"

          command -v gh >/dev/null 2>&1 || {
            echo "::error::GitHub CLI (gh) not found on runner. Install gh or use a GitHub-hosted runner (gh is preinstalled)."
            exit 1
          }
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Secret SLAI_APP_DEV_PR_TOKEN is not set. Use hosted submit locally, or configure the CI PAT fallback per SKILL.md §1c."
            exit 1
          fi
          BRANCH="deploy/${APP_ID}/sync-${GITHUB_SHA:0:12}"
          WORK="$(mktemp -d)"
          git clone --depth 1 --branch "${SLAI_BASE_REF}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${SLAI_REPO}.git" "${WORK}"
          cd "${WORK}"
          git checkout -b "${BRANCH}"
          DEST="deploy/slai-app-prod/${APP_ID}"
          mkdir -p "${DEST}"
          for f in deployment.yaml service.yaml z-ingress.yaml secrets.enc.yaml tls-secret.enc.yaml networkpolicy.yaml; do
            if [[ -f "${HANDOFF}/${f}" ]]; then
              cp "${HANDOFF}/${f}" "${DEST}/${f}"
            fi
          done
          yq eval '.spec.template.spec.containers[0].image = strenv(FULL_IMAGE)' -i "${DEST}/deployment.yaml"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "${DEST}"
          if git diff --staged --quiet; then
            echo "::notice::No changes to ${DEST} after sync (image may already match); skipping PR."
            exit 0
          fi
          git commit -m "chore(${APP_ID}): sync manifests, image ${FULL_IMAGE}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${SLAI_REPO}.git" "HEAD:refs/heads/${BRANCH}"
          BODY=$(printf '%s\n' \
            "Automated deploy from \`${GITHUB_REPOSITORY}\` @ \`${GITHUB_SHA}\`." \
            "" \
            "- **Handoff copied from:** \`${MANIFEST_HANDOFF_REL}\` → \`${DEST}\`" \
            "- **FULL_IMAGE:** \`${FULL_IMAGE}\`" \
            "" \
            "Merge this manifest PR; platform maintainers handle cluster rollout.")
          # Required: exactly one deploy/<namespace> label matching deploy/... (see repo .github/pull_request_template.md)
          gh pr create \
            --repo "${SLAI_REPO}" \
            --base "${SLAI_BASE_REF}" \
            --head "${BRANCH}" \
            --label deploy/slai-app-prod \
            --title "chore(${APP_ID}): sync manifests / bump image" \
            --body "${BODY}"
