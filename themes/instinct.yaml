name: AMD Instinct
description: Teal-on-dark Instinct design system — technical marketing, benchmarks, engineering decks

# Colors from the AMD Instinct design system (DESIGN.md / tokens.css).
# background=#131416 (Daedalus black), accent=#00C2DE (AMD teal),
# surface hierarchy: L0=#131416, L1=#1d1f21, L2=#27272a.

colors:
  background: "131416"
  background_alt: "1d1f21"
  surface: "27272a"
  text_primary: "eaebec"
  text_secondary: "b4b9bc"
  text_body: "d0d4d8"
  accent: "00C2DE"
  accent_alt: "F26522"
  warning: "ED1C24"
  code_bg: "131416"
  code_text: "00C2DE"
  stat_color: "00C2DE"

typography:
  title_size: 36
  heading_size: 28
  subtitle_size: 18
  body_size: 16
  small_size: 14
  eyebrow_size: 8
  eyebrow_bold: false
  eyebrow_char_spacing: 6
  stat_size: 48
  stat_bold: true
  stat_label_size: 16
  stat_desc_size: 13
  code_size: 14
  footer_size: 10

data_colors:
  series_1: "00C2DE"
  series_2: "F26522"
  series_3: "27272a"
  positive: "1AA01A"
  negative: "D73D2B"
  neutral: "b4b9bc"

shadow:
  blur: 4
  offset: 2
  angle: 135
  color: "003040"
  opacity: 0.15

eyebrow:
  show: true
  dash_width: 1.2
  dash_height: 0.035
  label_offset: 1.35

fonts:
  heading: "Arial"
  body: "Arial"
  mono: "Consolas"

logo:
  path: "themes/assets/instinct-lockup-wht.png"
  position: "bottom-right"
  width_inches: 1.5
  height_inches: 0.32
  x_inches: 11.83
  y_inches: 7.0

slide:
  layout: "LAYOUT_WIDE"
  margin_inches: 0.64

footer:
  show: true
  text: ""
  show_slide_numbers: true

master:
  background_image: "themes/assets/instinct-dotgrid.png"
  title:
    background: "131416"
  content:
    background: "131416"
    glow_line: true
  section_divider:
    panel_width_pct: 18
