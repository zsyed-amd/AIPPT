name: Default
description: Clean dark theme, no branding

colors:
  background: "1E293B"
  background_alt: "0F172A"
  surface: "334155"
  text_primary: "F8FAFC"
  text_secondary: "94A3B8"
  text_body: "CBD5E1"
  accent: "3B82F6"
  accent_alt: "10B981"
  warning: "EF4444"

fonts:
  heading: "Trebuchet MS"
  body: "Calibri"
  mono: "Consolas"

logo:
  path: ""
  position: "bottom-right"
  width_inches: 0

slide:
  layout: "LAYOUT_WIDE"      # 13.33" × 7.5" — all guide coordinates use this size
  margin_inches: 0.5

footer:
  show: true
  text: ""
  show_slide_numbers: true

typography:
  title_size: 36
  heading_size: 28
  subtitle_size: 18
  body_size: 18
  small_size: 14
  eyebrow_size: 8
  eyebrow_bold: false
  eyebrow_char_spacing: 6
  stat_size: 48
  stat_bold: true
  stat_label_size: 16
  stat_desc_size: 13
  code_size: 14
  footer_size: 10

data_colors:
  series_1: ""
  series_2: ""
  series_3: ""
  positive: "1AA01A"
  negative: "D73D2B"
  neutral: ""

shadow:
  blur: 4
  offset: 2
  angle: 135
  color: "000000"
  opacity: 0.12

eyebrow:
  show: true
  dash_width: 1.2
  dash_height: 0.035
  label_offset: 1.35

# Slide master overrides (optional, used when createDeck({ useSlideMaster: true }))
# master:
#   title:
#     background: "0F172A"          # override title master bg (default: background_alt)
#   content:
#     background: "1E293B"          # override content master bg (default: background)
#   section_divider:
#     panel_width_pct: 18           # override left panel width (default: 18%)
