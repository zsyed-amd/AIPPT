apiVersion: apps/v1
kind: Deployment
metadata:
  name: aippt
  namespace: slai-security-infrastructure-dev
  labels:
    app.kubernetes.io/name: aippt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aippt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aippt
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: mkmhub.amd.com/hw-slai-dev/aippt:YOUR_GIT_SHA
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://atlvslaiapp03:4317"
            - name: OTEL_SERVICE_NAME
              value: aippt
            - name: AIPPT_VIEW_ONLY
              value: "0"
            - name: AMD_LLM_KEY
              valueFrom:
                secretKeyRef:
                  name: aippt-secrets
                  key: AMD_LLM_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aippt-data
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
