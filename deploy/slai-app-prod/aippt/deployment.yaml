apiVersion: apps/v1
kind: Deployment
metadata:
  name: hosted-slai-aippt
  namespace: slai-app-prod
  labels:
    app.kubernetes.io/name: aippt
    app.kubernetes.io/instance: hosted-slai-aippt
    app.kubernetes.io/managed-by: slai-app-platform
    hosted-by: slai-app-platform
    customer-team: tme-dcgpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aippt
      app.kubernetes.io/instance: hosted-slai-aippt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aippt
        app.kubernetes.io/instance: hosted-slai-aippt
        app.kubernetes.io/managed-by: slai-app-platform
        hosted-by: slai-app-platform
        customer-team: tme-dcgpu
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: mkmhub.amd.com/hw-slaiapp-dev/aippt:13f7c6f43d864ca12231c0a8830afe428c627f86
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://atlvslaiapp03:4317"
            - name: OTEL_SERVICE_NAME
              value: aippt
            - name: AIPPT_VIEW_ONLY
              value: "0"
            # readOnlyRootFilesystem: redirect $HOME (used by ~/.cache lookups in
            # aippt/builder.py and any third-party libs) into the writable
            # /app/data emptyDir, and skip .pyc writes on the read-only /app tree.
            - name: HOME
              value: /app/data
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: AMD_LLM_KEY
              valueFrom:
                secretKeyRef:
                  name: aippt-secrets
                  key: AMD_LLM_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 5Gi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
