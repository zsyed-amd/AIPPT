apiVersion: apps/v1
kind: Deployment
metadata:
  name: hosted-slai-aippt
  namespace: slai-app-prod
  labels:
    app.kubernetes.io/name: aippt
    app.kubernetes.io/instance: hosted-slai-aippt
    app.kubernetes.io/managed-by: slai-app-platform
    hosted-by: slai-app-platform
    customer-team: tme-dcgpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aippt
      app.kubernetes.io/instance: hosted-slai-aippt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aippt
        app.kubernetes.io/instance: hosted-slai-aippt
        app.kubernetes.io/managed-by: slai-app-platform
        hosted-by: slai-app-platform
        customer-team: tme-dcgpu
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: mkmhub.amd.com/hw-slaiapp-dev/aippt:5c3ec651a9e36fc9aa3ef75a11193375cf83bc0a
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://atlvslaiapp03:4317"
            - name: OTEL_SERVICE_NAME
              value: aippt
            - name: AIPPT_VIEW_ONLY
              value: "0"
            # Path-under-apex mount: ingress strips /aippt before forwarding
            # server-side, but the browser still loads the SPA from
            # https://slai-app.amd.com/aippt/. The server injects
            # <base href="${BASE_PATH}"> into index.html so the SPA's
            # relative static/, api/, docs/, and slide-image/ URLs resolve
            # correctly under the public origin.
            - name: BASE_PATH
              value: "/aippt/"
            # readOnlyRootFilesystem: redirect $HOME (used by ~/.cache lookups in
            # aippt/builder.py and any third-party libs) into the writable
            # /app/data emptyDir, and skip .pyc writes on the read-only /app tree.
            - name: HOME
              value: /app/data
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: AMD_LLM_KEY
              valueFrom:
                secretKeyRef:
                  name: aippt-secrets
                  key: AMD_LLM_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 5Gi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
