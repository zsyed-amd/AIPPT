apiVersion: apps/v1
kind: Deployment
metadata:
  name: hosted-slai-aippt
  namespace: slai-app-prod
  labels:
    app.kubernetes.io/name: aippt
    app.kubernetes.io/instance: hosted-slai-aippt
    app.kubernetes.io/managed-by: slai-app-platform
    hosted-by: slai-app-platform
    customer-team: tme-dcgpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aippt
      app.kubernetes.io/instance: hosted-slai-aippt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aippt
        app.kubernetes.io/instance: hosted-slai-aippt
        app.kubernetes.io/managed-by: slai-app-platform
        hosted-by: slai-app-platform
        customer-team: tme-dcgpu
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: mkmhub.amd.com/hw-slaiapp-dev/aippt:e538e2be4fbbff7c7f9386b80675da7225ccd09c
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          # Requests/limits are mandatory on the platform (admission rejects
          # pods without them). CPU limit held to 250m to fit the
          # slai-app-prod namespace quota (limits.cpu 8 total, ~7250m already
          # in use as of 2026-06-22 pending an increase to 16). Memory kept at
          # 1Gi for AIPPT's deck/image processing (python-pptx + pdftoppm/
          # cairosvg render + MinIO streaming). Revisit CPU once the quota
          # bump lands if render latency suffers.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 1Gi
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://atlvslaiapp03:4317"
            - name: OTEL_SERVICE_NAME
              value: aippt
            - name: AIPPT_VIEW_ONLY
              value: "0"
            # Path-under-apex mount: ingress strips /aippt before forwarding
            # server-side, but the browser still loads the SPA from
            # https://slai-app.amd.com/aippt/. The server injects
            # <base href="${BASE_PATH}"> into index.html so the SPA's
            # relative static/, api/, docs/, and slide-image/ URLs resolve
            # correctly under the public origin.
            - name: BASE_PATH
              value: "/aippt/"
            # readOnlyRootFilesystem: redirect $HOME (used by ~/.cache lookups in
            # aippt/builder.py and any third-party libs) into the writable
            # /app/data emptyDir, and skip .pyc writes on the read-only /app tree.
            - name: HOME
              value: /app/data
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            # --- Object storage (MinIO) durable backend ---
            # /app/data is now an ephemeral read-through/write-through cache;
            # MinIO under ogmatic-zoo/asic/aippt/ is the source of truth. The
            # catalog is restored from catalog/slides.db on startup and
            # snapshotted (debounced) on write. See PRD 2026-06-10.
            - name: AIPPT_STORAGE
              value: "s3"
            - name: MINIO_ENDPOINT
              value: "s3minio.amd.com:21000"
            - name: MINIO_BUCKET
              value: "ogmatic-zoo"
            - name: MINIO_PREFIX
              value: "asic/aippt/"
            # CA bundle baked by the Dockerfile (public AMD root + issuing CA
            # appended to the system store) so TLS verifies under
            # readOnlyRootFilesystem.
            - name: MINIO_CA_BUNDLE
              value: "/etc/ssl/certs/ca-bundle-with-amd.pem"
            - name: AMD_LLM_KEY
              valueFrom:
                secretKeyRef:
                  name: aippt-secrets
                  key: AMD_LLM_KEY
            # Add MINIO_ACCESS_KEY / MINIO_SECRET_KEY to the aippt-secrets
            # Secret (see deploy/slai-app-prod/aippt/secrets.enc.yaml) before
            # rolling this out. Mint the key in the MinIO console scoped to
            # asic/; rotate by updating the sealed secret and restarting.
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aippt-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aippt-secrets
                  key: MINIO_SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 5Gi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
