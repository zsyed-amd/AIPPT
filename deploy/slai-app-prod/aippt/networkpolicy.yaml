apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hosted-slai-aippt
  namespace: slai-app-prod
  labels:
    app.kubernetes.io/name: aippt
    app.kubernetes.io/instance: hosted-slai-aippt
    app.kubernetes.io/managed-by: slai-app-platform
    hosted-by: slai-app-platform
    customer-team: tme-dcgpu
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: aippt
      app.kubernetes.io/instance: hosted-slai-aippt
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Match the pattern used by other slai-app-prod apps (dremio-cli,
    # hello-demo, dcgpu-hub, harbor-cli-proxy): no `from:` restriction
    # so the nginx-ingress controller can reach the pod regardless of
    # which namespace it lives in on this cluster.
    - ports:
        - protocol: TCP
          port: 8000
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # OTLP gRPC -> platform collector (atlvslaiapp03:4317)
    - ports:
        - protocol: TCP
          port: 4317
    # TCP 443 covers:
    #   - LLM Gateway (llm-api.amd.com)
    #   - Microsoft Graph (graph.microsoft.com) for SharePoint PPTX render
    #   - Azure AD device-code auth (login.microsoftonline.com)
    - ports:
        - protocol: TCP
          port: 443
